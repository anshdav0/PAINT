<!DOCTYPE html>
<html lang="en">
<head>
    <title>Paint</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="fashion.css">
</head>
<body>
    <div class="everything">
    <canvas id="canvas"></canvas>
    <div class="shapes">
        <button class="but" id="rect" title="Click and Drag &#10(Shortcut r)" onclick="drawRect()">Rectangle</button>
        <button class="but" id="cir" title="Click and Drag &#10(Shortcut c)" onclick="drawCir()">Circle</button>
        <button class="but" id="tri" title="Click 3 points to draw &#10Don't drag(Shortcut t)" onclick="drawTri()">Triangle</button>
        <button class="but" id="brs1" title="Click and Drag &#10(Shortcut b)" onclick="drawStok()">Brush</button>
        <button class="but" id="brs2" title="Click and Drag &#10(Shortcut e)" onclick="drawStok2()">Eraser</button>
        <button class="but" id="txt" title="Click, Type, &#10Press ENTER when done &#10(Shortcut Shift + t)" onclick="txt()">Text</button>
        <button class="but" id="sele" title="Move shapes around and apply current&#10configuration on them &#10(Shortcut m)" onclick="selection()">Move/Edit</button>
        <button class="but" id="remv" title="Click and drag to resize &#10(Shortcut s)" onclick="remv()">Scale</button>
        <button class="but" id="rot" title="Click and Drag &#10(Shortcut Shift + r)" onclick="rotation()">Rotate</button>
        <button class="but" id="fill" title="Click the shapes to color &#10(Shortcut f)" onclick="fillcolr()">FillColor</button>
        <button class="but" onclick="save()">Save</button>
        <button class="but" onclick="reset()">Reset</button>
        <button class="but" onclick="theme()">Theme</button>
    </div>
    
    <div class="color">
        <button class="colorbt" style="background: red;" onclick="setCol('red')"></button>
        <button class="colorbt" style="background: green;" onclick="setCol('green')"></button>
        <button class="colorbt" style="background: black;" onclick="setCol('black')"></button>
        <button class="colorbt" style="background: blue;" onclick="setCol('blue')"></button>
        <button class="colorbt" style="background: white;" onclick="setCol('white')"></button>
        <button class="colorbt" style="background: lime;" onclick="setCol('lime')"></button>
        <input type="color" id="colorPicker" class="colorbt" value="#12e3e2">
        <span class="lable">Color</span>
        <button class="colorbt" id="Curcol" style="background: black;"></button>
        
    </div>
    <div class="slidercontainer">
    <input type="range" class="slider" id="widthofline" min="1" max="20" value="2">
    <span class="lable">BrushSize</span>
    </div>
    </div>
    <input id="textInput" type="text" style="position: fixed; opacity: 0; pointer-events: none;">
    <script src="paintfc.js"></script>
    <script src="animation.js"></script>
</body>
</html>
